<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Temple Album</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">

    <!-- JavaScript -->
    <script src="scripts/temples.js" defer></script>
</head>

<body>

    <header>
        <div class="header-container">
            <h2>Temple Album</h2>

            <button id="menu-button">&#9776;</button>

            <nav>
                <a href="#">Home</a>
                <a href="#">Old</a>
                <a href="#">New</a>
                <a href="#">Large</a>
                <a href="#">Small</a>
            </nav>
        </div>
    </header>

    <main>
        <h1>Temple Gallery</h1>

        <div class="gallery">

            <figure>
                <img src="images/temple1.jpeg" alt="Temple 1" loading="lazy">
                <figcaption>Aba Nigeria Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple2.jpeg" alt="Temple 2" loading="lazy">
                <figcaption>Accra Ghana Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple3.jpg" alt="Temple 3" loading="lazy">
                <figcaption>Rome Italy Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple4.jpeg" alt="Temple 4" loading="lazy">
                <figcaption>Salt Lake Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple5.jpeg" alt="Temple 5" loading="lazy">
                <figcaption>Kinshasa Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple6.jpg" alt="Temple 6" loading="lazy">
                <figcaption>Paris France Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple7.jpeg" alt="Temple 7" loading="lazy">
                <figcaption>Mexico City Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple8.jpeg" alt="Temple 8" loading="lazy">
                <figcaption>Sydney Australia Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple9.jpeg" alt="Temple 9" loading="lazy">
                <figcaption>Tokyo Japan Temple</figcaption>
            </figure>

        </div>
    </main>

    <footer>
        <p>
            &copy; <span id="currentyear"></span>
            | Ebuka Prince Okubalu | Nigeria
        </p>

        <p id="lastModified"></p>
    </footer>

</body>
</html>
