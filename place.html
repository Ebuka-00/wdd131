<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nigeria</title>

    <link rel="stylesheet" href="styles/place.css">

    <script src="scripts/place.js" defer></script>
</head>

<body>

    <header>
        <h1>Nigeria</h1>
    </header>

    <main>

        <!-- HERO IMAGE -->
        <picture>
            <source srcset="images/nigeriaphoto2.jpg" media="(min-width: 768px)">
            <img src="images/nigeriaphoto.jpg" alt="Beautiful Nigeria Landscape">
        </picture>

        <!-- DATA SECTION -->
        <section class="card data">
            <h2>Data</h2>

            <p><strong>Area:</strong> 923,768 km²</p>
            <p><strong>Population:</strong> 220 million+</p>
            <p><strong>Capital:</strong> Abuja</p>
            <p><strong>Languages:</strong> English, Igbo, Yoruba, Hausa</p>
            <p><strong>Currency:</strong> Naira</p>
            <p><strong>Time Zone:</strong> UTC+1</p>
        </section>

        <!-- WEATHER SECTION -->
        <section class="card weather">
            <h2>Weather</h2>

            <img src="images/weather.svg" alt="Weather Icon" class="weather-icon">

            <p><strong>Temperature:</strong> <span id="temp">8</span> °C</p>
            <p><strong>Conditions:</strong> Cloudy</p>
            <p><strong>Wind:</strong> <span id="wind">10</span> km/h</p>
            <p><strong>Wind Chill:</strong> <span id="windchill"></span></p>
        </section>

    </main>

    <footer>
        <p>
            © <span id="year"></span> | Ebuka Prince Okubalu | Nigeria
        </p>

        <p id="lastModified"></p>
    </footer>

</body>
</html>
